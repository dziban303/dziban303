
      <svg
        width="300"
        height="350"
        viewBox="0 0 300 350"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-labelledby="descId"
      >
        <title id="titleId"></title>
        <desc id="descId"></desc>
        <style>
          .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #ffcc00;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
          }
          @supports(-moz-appearance: auto) {
            /* Selector detects Firefox */
            .header { font-size: 15.5px; }
          }
          
    @keyframes slideInAnimation {
      from {
        width: 0;
      }
      to {
        width: calc(100%-100px);
      }
    }
    @keyframes growWidthAnimation {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #8080ff;
    }
    @supports(-moz-appearance: auto) {
      /* Selector detects Firefox */
      .stat { font-size:12px; }
    }
    .bold { font-weight: 700 }
    .lang-name {
      font: 400 11px "Segoe UI", Ubuntu, Sans-Serif;
      fill: #8080ff;
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    #rect-mask rect{
      animation: slideInAnimation 1s ease-in-out forwards;
    }
    .lang-progress{
      animation: growWidthAnimation 0.6s ease-in-out forwards;
    }
    

          
      /* Animations */
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      @keyframes fadeInAnimation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    
          
        </style>

        

        <rect
          data-testid="card-bg"
          x="0.5"
          y="0.5"
          rx="4.5"
          height="99%"
          stroke="#e4e2e2"
          width="299"
          fill="#141439"
          stroke-opacity="1"
        />

        
      <g
        data-testid="card-title"
        transform="translate(25, 35)"
      >
        <g transform="translate(0, 0)">
      <text
        x="0"
        y="0"
        class="header"
        data-testid="header"
      >Most Used Languages</text>
    </g>
      </g>
    

        <g
          data-testid="main-card-body"
          transform="translate(0, 55)"
        >
          
    <svg data-testid="lang-items">
      <g transform="translate(0, 0)">
        <svg data-testid="pie">
          
      <g class="stagger" style="animation-delay: 100ms">
        <path
          data-testid="lang-pie"
          size="84.27129281506261"
          d="M 150 100 L 240 100 A 90 90 0 1 1 199.51264728870166 24.84351153450139 Z"
          fill="#663399"
        />
      </g>
    
      <g class="stagger" style="animation-delay: 200ms">
        <path
          data-testid="lang-pie"
          size="15.657657124248795"
          d="M 150 100 L 199.51264728870166 24.84351153450139 A 90 90 0 0 1 239.9991031900136 99.59822270686253 Z"
          fill="#3572A5"
        />
      </g>
    
      <g class="stagger" style="animation-delay: 300ms">
        <path
          data-testid="lang-pie"
          size="0.0710500606885935"
          d="M 150 100 L 239.9991031900136 99.59822270686253 A 90 90 0 0 1 240 100.00000000000006 Z"
          fill="#384d54"
        />
      </g>
    
        </svg>
      </g>
      <g transform="translate(0, 220)">
        <svg data-testid="lang-names" x="25">
          <g transform="translate(0, 0)"><g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <circle cx="5" cy="6" r="5" fill="#663399" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        CSS 84.27%
      </text>
    </g>
  </g><g transform="translate(0, 25)">
    <g class="stagger" style="animation-delay: 600ms">
      <circle cx="5" cy="6" r="5" fill="#3572A5" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Python 15.66%
      </text>
    </g>
  </g></g><g transform="translate(150, 0)"><g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <circle cx="5" cy="6" r="5" fill="#384d54" />
      <text data-testid="lang-name" x="15" y="10" class='lang-name'>
        Dockerfile 0.07%
      </text>
    </g>
  </g></g>
        </svg>
      </g>
    </svg>
  
        </g>
      </svg>
    